<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">เข้าสู่ระบบ</h1>
        <p class="text-gray-500">กรุณากรอกข้อมูลเพื่อเข้าใช้งาน</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700"
            >ชื่อผู้ใช้งาน</label
          >
          <div class="mt-1 relative">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
            >
              <i class="fas fa-user"></i>
            </span>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 border-gray-300"
              placeholder="Username"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >รหัสผ่าน</label
          >
          <div class="mt-1 relative">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
            >
              <i class="fas fa-lock"></i>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 border-gray-300"
              placeholder="••••••••"
            />
          </div>
        </div>

        <div id="errorMessage" class="hidden text-red-500 text-sm text-center">
          ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง
        </div>

        <button
          type="submit"
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
          Sign in
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          ยังไม่มีบัญชี?
          <a
            href="/register"
            class="font-medium text-blue-600 hover:text-blue-500"
            >สมัครสมาชิก</a
          >
        </p>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const errorDiv = document.getElementById("errorMessage");

          try {
            // ยิง API ไปที่ Router ของคุณ (ปรับ URL ตามจริง)
            const response = await fetch(
              "http://127.0.0.1:8000/api/auth/login",
              {
                method: "POST",
                mode: "cors",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ username, password }),
              },
            );

            const data = await response.json();

            if (response.ok) {
              if (data.access_token) {
                localStorage.setItem("token", data.access_token);
              }
              // เก็บ user_id ไว้ใช้ query ข้อมูลของตัวเอง
              if (data.user_id) {
                localStorage.setItem("user_id", data.user_id);
              }

              alert("เข้าสู่ระบบสำเร็จ!");
              window.location.href = "/index.html"; // แก้จาก /dashboard เป็น index.html
            }
          } catch (error) {
            console.error("Error:", error);
            errorDiv.textContent = "ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้";
            errorDiv.classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
