<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h2 class="text-xl font-bold text-gray-800">จัดการบุคลากร (Personnel)</h2>
    <button
      onclick="PersonnelApp.openModal()"
      class="bg-[#28a745] hover:bg-[#218838] text-white px-4 py-2 rounded text-sm font-bold shadow transition active:scale-95"
    >
      + เพิ่มบุคลากรใหม่
    </button>
  </div>

  <div class="bg-white rounded shadow-sm p-4 border border-gray-200">
    <div class="relative max-w-sm">
      <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">🔍</span>
      <input
        type="text"
        id="personnel-search"
        oninput="PersonnelApp.applyFilters()"
        placeholder="ค้นหาชื่อ หรือตำแหน่ง..."
        class="w-full bg-white border border-gray-300 text-gray-800 text-sm rounded py-2 pl-9 pr-4 focus:ring-1 focus:ring-green-500 outline-none"
      />
    </div>
  </div>

  <div class="bg-white rounded shadow-sm card-primary card-outline overflow-hidden border border-gray-200">
    <div class="px-4 py-3 border-b border-gray-100 font-bold text-gray-700 text-sm">
      รายชื่อบุคลากรทั้งหมด
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm">
        <thead class="bg-gray-50 text-gray-600 font-bold uppercase text-[11px] border-b">
          <tr>
            <th class="px-4 py-3 text-center border-r w-16">ID</th>
            <th class="px-4 py-3 border-r">ชื่อ-นามสกุล</th>
            <th class="px-4 py-3 border-r">ชื่อเล่น</th>
            <th class="px-4 py-3 border-r">ตำแหน่ง</th>
            <th class="px-4 py-3 text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="personnel-list" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>

    <div id="personnel-empty-state" class="hidden py-12 text-center text-gray-400 bg-white">
      <p class="text-3xl mb-1">👤</p>
      <p class="text-sm">ไม่พบข้อมูลบุคลากร</p>
    </div>
  </div>
</div>

<div
  id="personnel-modal"
  class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50"
>
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md overflow-hidden">
    <div class="px-4 py-3 border-b flex justify-between items-center bg-gray-50">
      <h3 id="p-modal-title" class="font-bold text-gray-700">เพิ่มบุคลากรใหม่</h3>
      <button onclick="PersonnelApp.closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
    </div>
    <form id="personnel-form" class="p-4 space-y-4">
      <input type="hidden" id="edit-personnel-id" />
      
      <div>
        <label class="block text-xs font-bold text-gray-600 mb-1">ชื่อ-นามสกุล *</label>
        <input
          type="text"
          id="personnel-full-name"
          required
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none"
        />
      </div>

            <div>
        <label class="block text-xs font-bold text-gray-600 mb-1">ชื่อเล่น</label>
        <input
          type="text"
          id="personnel-nickname"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-600 mb-1">ตำแหน่ง (Position)</label>
        <input
          type="text"
          id="personnel-position"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none"
        />
      </div>

      <dic

      <div class="flex justify-end space-x-2 pt-2">
        <button
          type="button"
          onclick="PersonnelApp.closeModal()"
          class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded"
        >ยกเลิก</button>
        <button
          type="submit"
          class="px-4 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded shadow"
        >บันทึกข้อมูล</button>
      </div>
    </form>
  </div>
</div>

<script src="src/pages/person/app.js"></script>
