version: '3.8'

services:
  backend:
    build: ./system
    container_name: teamtasks-system
    volumes:
      - ./system:/app
    environment:
      - ENV=development
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: teamtasks-ui
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: teamtasks-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge